name: PR

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-lint:
    name: Repository lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Lint GitHub Actions workflows
        run: >-
          docker run --rm
          -v "$PWD:/repo:ro"
          -w /repo
          rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
          -color

      - name: Lint pull request commits
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: >-
          npx --yes
          -p @commitlint/cli@21.2.1
          -p @commitlint/config-conventional@21.2.0
          commitlint
          --config commitlint.config.cjs
          --from "$BASE_SHA"
          --to "$HEAD_SHA"
          --verbose

      - name: Lint latest commit
        if: github.event_name != 'pull_request'
        run: >-
          npx --yes
          -p @commitlint/cli@21.2.1
          -p @commitlint/config-conventional@21.2.0
          commitlint
          --config commitlint.config.cjs
          --last
          --verbose

      - name: Lint Markdown
        run: git ls-files -z '*.md' | xargs -0 npx --yes markdownlint-cli2@0.23.0

  catalog:
    name: Scenario catalog
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check scenario catalog
        run: |
          python3 tools/check-scenarios.py --write-matrix
          git diff --exit-code docs/scenario-matrix.md

  java-fast:
    name: Java compile and smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      website:
        image: gprestes/the-internet:v2.6.5@sha256:205b8fc712747ea5fa1a0d54b01fa02d65e3f67a448c7a5c2aba65b211def171
        ports:
          - 7080:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Compile Java tests
        run: mvn -B -f stacks/java-selenium-testng/pom.xml clean test-compile

      - name: Run Java smoke
        run: >-
          mvn -B -f stacks/java-selenium-testng/pom.xml -P CLI_Parameters test
          -DsuiteXmlFile=src/test/resources/smoke.xml
          -Dbrowser=chrome
          -DbrowserVersion=
          -DheadlessBrowser=true
          -DuseSeleniumGrid=false
          -DtestsThreadCount=1
          -DwebAppAddress=http://localhost:7080
          -DtestRunnerAddress=http://localhost:7080
          -DseleniumGridAddress=http://localhost:4444/wd/hub

      - name: Stage Java reports
        if: always()
        run: |
          report_dir="artifacts/java/${GITHUB_RUN_ID}/smoke/surefire-reports"
          mkdir -p "$report_dir"
          if [ -d stacks/java-selenium-testng/target/surefire-reports ]; then
            find stacks/java-selenium-testng/target/surefire-reports -name '*.xml' -exec cp {} "$report_dir/" \;
          fi

      - name: Upload Surefire XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-smoke-${{ github.run_id }}-surefire-xml
          path: artifacts/java/${{ github.run_id }}/smoke/
          if-no-files-found: warn

  ts-fast:
    name: TypeScript typecheck and smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      website:
        image: gprestes/the-internet:v2.6.5@sha256:205b8fc712747ea5fa1a0d54b01fa02d65e3f67a448c7a5c2aba65b211def171
        ports:
          - 7080:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: stacks/ts-playwright/package-lock.json

      - name: Install TypeScript stack dependencies
        working-directory: stacks/ts-playwright
        run: npm ci

      - name: Type-check TypeScript stack
        working-directory: stacks/ts-playwright
        run: npm run typecheck

      - name: Lint TypeScript stack
        working-directory: stacks/ts-playwright
        run: npm run lint

      - name: Check TypeScript stack formatting
        working-directory: stacks/ts-playwright
        run: npm run format:check

      - name: Install Chromium browser
        working-directory: stacks/ts-playwright
        run: npx playwright install --with-deps chromium

      - name: Run TypeScript Chromium smoke
        working-directory: stacks/ts-playwright
        env:
          THE_INTERNET_BASE_URL: http://localhost:7080
          PLAYWRIGHT_HTML_REPORT: ../../artifacts/ts/${{ github.run_id }}/smoke/html-report
          PLAYWRIGHT_TEST_RESULTS: ../../artifacts/ts/${{ github.run_id }}/smoke/test-results
        run: npm run test:chromium:smoke

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-smoke-${{ github.run_id }}-playwright
          path: artifacts/ts/${{ github.run_id }}/smoke/
          if-no-files-found: ignore
