name: PR

on:
  pull_request:
    branches:
      - master
    paths:
      - stacks/java-selenium-testng/**
      - stacks/ts-playwright/**
      - scenarios/**
      - tools/**
      - docs/**
      - .github/workflows/pr.yml
  push:
    branches:
      - master
    paths:
      - stacks/java-selenium-testng/**
      - stacks/ts-playwright/**
      - scenarios/**
      - tools/**
      - docs/**
      - .github/workflows/pr.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java-suite:
    name: Java Selenium suite
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    services:
      website:
        image: gprestes/the-internet:latest
        ports:
          - 7080:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Check scenario catalog
        run: |
          python3 tools/check-scenarios.py --write-matrix
          git diff --exit-code docs/scenario-matrix.md

      - name: Run Java suite
        run: >-
          mvn -B -f stacks/java-selenium-testng/pom.xml -P CLI_Parameters clean test
          -DsuiteXmlFile=src/test/resources/regression.xml
          -Dbrowser=chrome
          -DbrowserVersion=
          -DheadlessBrowser=true
          -DuseSeleniumGrid=false
          -DtestsThreadCount=1
          -DwebAppAddress=http://localhost:7080
          -DtestRunnerAddress=http://localhost:7080
          -DseleniumGridAddress=http://localhost:4444/wd/hub

      - name: Upload Surefire XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-xml
          path: stacks/java-selenium-testng/target/surefire-reports/**/*.xml
          if-no-files-found: warn

  ts-smoke:
    name: TypeScript Playwright smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      website:
        image: gprestes/the-internet:latest
        ports:
          - 7080:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: stacks/ts-playwright/package-lock.json

      - name: Install TypeScript stack dependencies
        working-directory: stacks/ts-playwright
        run: npm ci

      - name: Install Chromium browser
        working-directory: stacks/ts-playwright
        run: npx playwright install --with-deps chromium

      - name: Type-check TypeScript stack
        working-directory: stacks/ts-playwright
        run: npm run typecheck

      - name: Lint TypeScript stack
        working-directory: stacks/ts-playwright
        run: npm run lint

      - name: Run TypeScript Chromium smoke
        working-directory: stacks/ts-playwright
        env:
          THE_INTERNET_BASE_URL: http://localhost:7080
        run: npm run test:chromium:smoke

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-playwright-artifacts
          path: |
            stacks/ts-playwright/playwright-report/
            stacks/ts-playwright/test-results/
          if-no-files-found: ignore
