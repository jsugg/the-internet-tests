name: Java

on:
  pull_request:
    branches:
      - master
    paths:
      - stacks/java-selenium-testng/**
      - scenarios/**
      - tools/**
      - .github/workflows/java.yml
  push:
    branches:
      - master
    paths:
      - stacks/java-selenium-testng/**
      - scenarios/**
      - tools/**
      - .github/workflows/java.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    name: Java ${{ matrix.browser }} regression
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        browser:
          - chrome
          - firefox

    services:
      website:
        image: gprestes/the-internet:v2.6.5@sha256:205b8fc712747ea5fa1a0d54b01fa02d65e3f67a448c7a5c2aba65b211def171
        ports:
          - 7080:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run Java regression
        run: >-
          mvn -B -f stacks/java-selenium-testng/pom.xml -P CLI_Parameters clean test
          -DsuiteXmlFile=src/test/resources/regression.xml
          -Dbrowser=${{ matrix.browser }}
          -DbrowserVersion=
          -DheadlessBrowser=true
          -DuseSeleniumGrid=false
          -DtestsThreadCount=1
          -DwebAppAddress=http://localhost:7080
          -DtestRunnerAddress=http://localhost:7080
          -DseleniumGridAddress=http://localhost:4444/wd/hub

      - name: Upload Surefire XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-${{ matrix.browser }}-surefire-xml
          path: stacks/java-selenium-testng/target/surefire-reports/**/*.xml
          if-no-files-found: warn
